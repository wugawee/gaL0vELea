<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI股監控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,"Microsoft JhengHei",Arial,sans-serif;font-size:13px;padding:10px}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.title{font-size:17px;font-weight:700;color:#e3b341;white-space:nowrap}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#8b949e;cursor:pointer;font-size:13px}
.tab.on{background:#e3b341;color:#0d1117;border-color:#e3b341;font-weight:700}
.btn-r{padding:6px 14px;border-radius:6px;border:1px solid #26a641;background:#0d2a12;color:#26a641;cursor:pointer;font-size:13px;font-weight:700}
.panel{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:10px;overflow-x:auto}
.up{color:#f85149}.dn{color:#26a641}.fl{color:#8b949e}
.tbl{width:100%;border-collapse:collapse;min-width:760px}
.tbl th{background:#21262d;color:#e3b341;font-size:12px;padding:8px 6px;text-align:center;font-weight:700;position:sticky;top:0}
.tbl td{padding:8px 6px;font-size:12px;border-bottom:1px solid #21262d;text-align:center}
.tbl tr:hover td{background:#1c2128}
.tbl .nm{text-align:left;font-weight:700}
.sec-row td{background:#21262d!important;color:#58a6ff;font-weight:700;text-align:left;font-size:13px}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;margin:1px}
.s-gold{background:#2d2200;color:#e3b341;border:1px solid #e3b341}
.s-blue{background:#001d3d;color:#58a6ff;border:1px solid #58a6ff}
.s-grn{background:#0d2a12;color:#26a641;border:1px solid #26a641}
.s-prp{background:#1a0d2a;color:#bc8cff;border:1px solid #bc8cff}
.s-gray{background:#21262d;color:#8b949e;border:1px solid #30363d}
.loading{text-align:center;padding:30px;color:#8b949e}
.prog{text-align:center;padding:6px;color:#e3b341;font-size:12px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:6px;margin-bottom:8px}
.mkt-label{font-size:13px;font-weight:700;color:#e3b341;margin:8px 0 5px}
.sc{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:9px;cursor:pointer}
.sc.on{border:2px solid #e3b341}
.sc-nm{font-size:11px;color:#8b949e}
.sc-pr{font-size:15px;font-weight:700;margin:2px 0}
.sc-ch{font-size:10px}
.phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.pname{font-size:15px;font-weight:700}
.ppr{font-size:19px;font-weight:700}
.ma-row{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;margin:8px 0;padding:8px 0;border-top:1px solid #21262d;border-bottom:1px solid #21262d}
.tt{position:fixed;background:#21262d;border:1px solid #58a6ff;border-radius:7px;padding:8px 11px;font-size:11px;pointer-events:none;z-index:999;display:none;min-width:170px;line-height:1.7}
.tt b{color:#e3b341}
.calc{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:10px}
.calc-h{font-size:13px;font-weight:700;margin-bottom:8px}
.calc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.calc-row label{width:90px;color:#8b949e;font-size:12px}
.calc-row input,.calc-row select{flex:1;background:#2d2d00;border:1px solid #30363d;border-radius:5px;padding:7px 8px;color:#e3b341;font-size:13px;font-weight:700}
.calc-row select{background:#21262d;color:#e6edf3}
.calc-out{flex:1;background:#0d1a2d;border-radius:5px;padding:7px 8px;font-weight:700}
.calc-clr{padding:6px 12px;border-radius:5px;border:1px solid #f85149;background:#2d0000;color:#f85149;cursor:pointer;font-weight:700}
</style>
</head>
<body>

<div class="hdr">
  <div class="title">🤖 AI股監控</div>
  <div class="tabs">
    <button class="btn-r" onclick="loadAll()">🔄 更新</button>
    <button class="tab on" id="t-sum" onclick="setView('summary',this)">總覽</button>
    <button class="tab" id="t-tw" onclick="setView('tw',this)">台股</button>
    <button class="tab" id="t-us" onclick="setView('us',this)">美股</button>
    <button class="tab" id="t-calc" onclick="setView('calc',this)">🧮 計算機</button>
    <button class="tab" id="t-news" onclick="setView('news',this)">📰 新聞</button>
    <button class="tab" id="t-keyword" onclick="setView('keyword',this)">🔑 關鍵字</button>
    <button class="tab" id="t-inst" onclick="setView('inst',this)">🏦 法人</button>
  </div>
</div>

<div class="prog" id="prog"></div>
<div id="mainView"><div class="loading">🔄 載入即時股價中...</div></div>
<div class="tt" id="tt"></div>

<script>
const STOCKS=[
  {sym:"2330.TW",name:"台積電",mkt:"TW",cur:"TWD"},
  {sym:"3017.TW",name:"奇鋐",mkt:"TW",cur:"TWD"},
  {sym:"3324.TWO",name:"雙鴻",mkt:"TW",cur:"TWD"},
  {sym:"6873.TW",name:"泓德能源",mkt:"TW",cur:"TWD"},
  {sym:"0050.TW",name:"元大台灣50",mkt:"TW",cur:"TWD"},
  {sym:"0056.TW",name:"元大高股息",mkt:"TW",cur:"TWD"},
  {sym:"00984A.TW",name:"安聯台灣高息",mkt:"TW",cur:"TWD"},
  {sym:"3711.TW",name:"日月光投控",mkt:"TW",cur:"TWD"},
  {sym:"3680.TWO",name:"家登精密",mkt:"TW",cur:"TWD"},
  {sym:"TSM",name:"台積電ADR",mkt:"US",cur:"USD"},
  {sym:"GOOGL",name:"Google",mkt:"US",cur:"USD"},
  {sym:"NVDA",name:"輝達",mkt:"US",cur:"USD"},
  {sym:"AAPL",name:"蘋果",mkt:"US",cur:"USD"},
  {sym:"TSLA",name:"特斯拉",mkt:"US",cur:"USD"},
  {sym:"SPCX",name:"SpaceX",mkt:"US",cur:"USD"},
  {sym:"ENPH",name:"ENPH",mkt:"US",cur:"USD"},
  {sym:"MRVL",name:"MRVL",mkt:"US",cur:"USD"},
  {sym:"MU",name:"美光Micron",mkt:"US",cur:"USD"},
  {sym:"BE",name:"BE能源",mkt:"US",cur:"USD"},
  {sym:"QQQ",name:"QQQ",mkt:"US",cur:"USD"},
  {sym:"GLD",name:"GLD黃金",mkt:"US",cur:"USD"},
  {sym:"IAU",name:"IAU黃金",mkt:"US",cur:"USD"},
  {sym:"CRWV",name:"CoreWeave",mkt:"US",cur:"USD"},
  {sym:"SNPS",name:"Synopsys",mkt:"US",cur:"USD"},
  {sym:"CDNS",name:"Cadence",mkt:"US",cur:"USD"},
];

const DB={};
let curView='summary',curSym=STOCKS[0].sym,calcSym=STOCKS[0].sym;
function rnd(n,d=2){return n==null?null:+n.toFixed(d);}

// 多代理，最穩定的優先
// 你的專屬 Cloudflare Worker（穩定、免費、無 CORS 問題）
const WORKER_URL="https://gentle-mountain-7c00.wugawee.workers.dev";

function parseChart(json){
  const R=json.chart.result[0];const q=R.indicators.quote[0];
  const meta=R.meta||{};
  const isLive=meta.marketState&&['PRE','REGULAR','POST'].includes(meta.marketState);
  const ts_arr=R.timestamp||[];
  const lastIdx=ts_arr.length-1;
  const data=[];
  for(let i=0;i<ts_arr.length;i++){
    const ts=ts_arr[i];
    let close=q.close[i];
    let open=q.open[i], hi=q.high[i], lo=q.low[i];
    // 最後一筆若收盤為null（盤中或盤後未回填），直接用即時價補上
    if(i===lastIdx && close==null && meta.regularMarketPrice!=null){
      close=meta.regularMarketPrice;
      if(open==null)open=meta.regularMarketOpen??meta.regularMarketPrice;
      if(hi==null)hi=meta.regularMarketDayHigh??close;
      if(lo==null)lo=meta.regularMarketDayLow??close;
    }
    if(close==null)continue; // 中間的null才跳過
    open=open??close; hi=hi??close; lo=lo??close;
    const d=new Date(ts*1000);
    const mo=(d.getMonth()+1).toString().padStart(2,'0');
    const dy=d.getDate().toString().padStart(2,'0');
    data.push({date:`${mo}/${dy}`,o:rnd(open),h:rnd(hi),l:rnd(lo),c:rnd(close),vol:q.volume[i]||0,ts:ts});
  }
  // 若 meta 的即時時間比最後一筆還新（代表盤中當天K棒根本沒進timestamp），補一筆
  if(meta.regularMarketPrice!=null && meta.regularMarketTime!=null){
    const lastTs=data.length?data[data.length-1].ts:0;
    const mt=meta.regularMarketTime;
    const lastDay=new Date(lastTs*1000).toDateString();
    const mtDay=new Date(mt*1000).toDateString();
    if(mtDay!==lastDay){
      // 當天還沒有K棒，用即時價新增今天這筆
      const d=new Date(mt*1000);
      const mo=(d.getMonth()+1).toString().padStart(2,'0');
      const dy=d.getDate().toString().padStart(2,'0');
      data.push({date:`${mo}/${dy}`,
        o:rnd(meta.regularMarketOpen??meta.regularMarketPrice),
        h:rnd(meta.regularMarketDayHigh??meta.regularMarketPrice),
        l:rnd(meta.regularMarketDayLow??meta.regularMarketPrice),
        c:rnd(meta.regularMarketPrice),
        vol:meta.regularMarketVolume||0,ts:mt});
    }
  }
  if(data.length>0){
    data._marketState=meta.marketState||'CLOSED';
    data._isLive=isLive;
  }
  return data;
}
async function fetchStock(sym,tries=0){
  const cacheBuster=Date.now();
  const url=`${WORKER_URL}/?symbol=${encodeURIComponent(sym)}&_t=${cacheBuster}`;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),12000);
    const res=await fetch(url,{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(timer);
    const json=await res.json();
    const data=parseChart(json);
    if(data.length>=1)return data;
  }catch(e){}
  // 失敗重試（最多3次）
  if(tries<3){await new Promise(r=>setTimeout(r,1200));return fetchStock(sym,tries+1);}
  return [];
}

function ma(arr,p){return arr.map((_,i)=>i<p-1?null:rnd(arr.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p));}
function calcKD(data,p=9){let K=50,D=50;return data.map((d,i)=>{const sl=data.slice(Math.max(0,i-p+1),i+1);const hi=Math.max(...sl.map(x=>x.h)),lo=Math.min(...sl.map(x=>x.l));const rsv=hi===lo?50:((d.c-lo)/(hi-lo))*100;K=(2/3)*K+(1/3)*rsv;D=(2/3)*D+(1/3)*K;return{K:rnd(K),D:rnd(D)};});}
function calcMACD(closes){const ema=(arr,pp)=>{const k=2/(pp+1);let e=arr[0];return arr.map((v,i)=>{if(i===0)return e;e=v*k+e*(1-k);return rnd(e,4);});};const ef=ema(closes,12),es=ema(closes,26);const dif=closes.map((_,i)=>rnd(ef[i]-es[i],4));const esig=ema(dif,9);return{dif,hist:dif.map((v,i)=>rnd(v-esig[i],4))};}

// 偵測所有看漲入場型態
function detectPatterns(data){
  const pats=[];
  for(let i=2;i<data.length;i++){
    const d=data[i],body=Math.abs(d.c-d.o),lower=Math.min(d.c,d.o)-d.l,upper=d.h-Math.max(d.c,d.o),range=d.h-d.l;
    const p1=data[i-1],p2=data[i-2];
    // 錘子線
    if(lower>body*1.8&&upper<body*0.5&&range>0)pats.push({i,type:'🔨錘子線',color:'#26a641',short:'錘'});
    // 倒錘（反轉）
    if(upper>body*1.8&&lower<body*0.5&&range>0&&d.c>d.o)pats.push({i,type:'倒錘線',color:'#26a641',short:'倒'});
    // 十字線
    if(body<range*0.08&&range>0)pats.push({i,type:'✛十字線',color:'#e3b341',short:'十'});
    // 蜻蜓十字（強力止跌）
    if(body<range*0.1&&lower>range*0.6&&range>0)pats.push({i,type:'蜻蜓十字',color:'#26a641',short:'蜻'});
    // 吞噬紅K
    if(d.c>d.o&&p1.c<p1.o&&d.c>p1.o&&d.o<p1.c)pats.push({i,type:'🔴吞噬紅K',color:'#58a6ff',short:'吞'});
    // 貫穿線（紅K收盤超過前黑K中點）
    if(p1.c<p1.o&&d.c>d.o&&d.o<p1.c&&d.c>(p1.o+p1.c)/2&&d.c<p1.o)pats.push({i,type:'貫穿線',color:'#58a6ff',short:'貫'});
    // 早晨之星
    if(p2.c<p2.o&&Math.abs(p1.c-p1.o)<Math.abs(p2.c-p2.o)*0.35&&d.c>d.o&&d.c>(p2.o+p2.c)/2)pats.push({i,type:'⭐早晨之星',color:'#bc8cff',short:'晨'});
    // 多頭母子（孕線）
    if(p1.c<p1.o&&d.c>d.o&&d.o>p1.c&&d.c<p1.o)pats.push({i,type:'多頭孕線',color:'#26a641',short:'孕'});
  }
  return pats;
}

function processStock(sym,data){
  if(!data||data.length<1){
    // 抓取失敗：若已有舊資料就保留，不要清空（避免代理失敗導致資料消失）
    if(!DB[sym])DB[sym]=null;
    return;
  }
  // 防退化：若新資料的最新日期比現有的舊（代理回傳快取），保留現有較新的資料
  if(DB[sym]&&DB[sym].data&&DB[sym].data.length>0){
    const oldTs=DB[sym].data[DB[sym].data.length-1].ts||0;
    const newTs=data[data.length-1].ts||0;
    if(newTs<oldTs)return; // 新抓的更舊，不覆蓋
  }
  const closes=data.map(d=>d.c);
  DB[sym]={data,closes,ma5:ma(closes,5),ma10:ma(closes,10),ma20:ma(closes,20),ma60:ma(closes,60),kd:calcKD(data),macd:calcMACD(closes),pats:detectPatterns(data),last:data[data.length-1],prev:(data.length>=2?data[data.length-2]:data[data.length-1])};
}

// 分批並行（每批5支，避免代理塞車）
async function loadAll(){
  document.getElementById('mainView').innerHTML='<div class="loading">🔄 載入即時股價中...</div>';
  let done=0;
  const BATCH=5;
  for(let i=0;i<STOCKS.length;i+=BATCH){
    const batch=STOCKS.slice(i,i+BATCH);
    await Promise.all(batch.map(async s=>{
      const data=await fetchStock(s.sym);
      processStock(s.sym,data);
      done++;
      document.getElementById('prog').textContent=`載入中... ${done}/${STOCKS.length}`;
    }));
  }
  document.getElementById('prog').textContent='';
  render();
  // 自動更新：每60秒重抓一次（盤中即時跟動）
  if(window._autoTimer)clearInterval(window._autoTimer);
  window._autoTimer=setInterval(()=>{loadAll();},60000);
}

function setView(v,el){curView=v;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));if(el)el.classList.add('on');render();}
function selectSym(sym,v){curSym=sym;curView=v||'tw';render();}

function render(){
  if(curView==='summary')renderSummary();
  else if(curView==='tw')renderList('TW');
  else if(curView==='us')renderList('US');
  else if(curView==='calc')renderCalcPage();
  else if(curView==='news')renderNews();
  else if(curView==='keyword')renderKeyword();
  else if(curView==='inst')renderInst();
  else renderChart(curSym);
}

// ── 總覽（首頁）──
function sumRow(s){
  const db=DB[s.sym];
  if(!db)return`<tr><td class="nm">${s.name}</td><td>${s.sym}</td><td colspan="9" style="color:#f85149">無資料</td></tr>`;
  const last=db.last,prev=db.prev,chg=rnd(last.c-prev.c),chgP=rnd(chg/prev.c*100);
  const kL=db.kd[db.kd.length-1],kP=db.kd[db.kd.length-2];
  const hL=db.macd.hist[db.macd.hist.length-1],hP=db.macd.hist[db.macd.hist.length-2];
  const m20=db.ma20[db.ma20.length-1],m20p=db.ma20[db.ma20.length-2];
  const cls=chg>0?'up':chg<0?'dn':'fl';
  const al=[];
  if(kP&&kP.K<kP.D&&kL.K>kL.D)al.push(`<span class="badge s-gold">KD金叉</span>`);
  if(m20&&last.c>m20&&prev.c<=m20p)al.push(`<span class="badge s-blue">突破20MA</span>`);
  else if(m20&&Math.abs(last.c-m20)/m20<=0.03)al.push(`<span class="badge s-blue">近20MA</span>`);
  if(hP<0&&hL>0)al.push(`<span class="badge s-grn">MACD翻正</span>`);
  const rp=db.pats.filter(p=>p.i>=db.data.length-3);
  [...new Map(rp.map(p=>[p.type,p])).values()].forEach(p=>al.push(`<span class="badge ${p.type.includes('早晨')?'s-prp':p.color==='#58a6ff'?'s-blue':p.color==='#e3b341'?'s-gold':'s-grn'}">${p.type}</span>`));
  if(!al.length)al.push(`<span class="badge s-gray">—</span>`);
  return`<tr style="cursor:pointer" onclick="selectSym('${s.sym}','${s.mkt==='TW'?'tw':'us'}')">
    <td class="nm">${s.name}</td><td style="color:#8b949e">${s.sym}</td>
    <td class="${cls}">${last.c}</td>
    <td style="color:#e3b341">${db.ma5[db.ma5.length-1]??'—'}</td>
    <td style="color:#bc8cff">${m20??'—'}</td>
    <td style="color:#26a641">${db.ma60[db.ma60.length-1]??'—'}</td>
    <td>${kL.K}</td><td>${kL.D}</td>
    <td>${kL.K>kL.D?'<span class="up">K&gt;D</span>':'<span class="dn">K&lt;D</span>'}</td>
    <td>${hL>0?'<span class="up">正</span>':'<span class="dn">負</span>'}</td>
    <td style="text-align:left">${al.join('')}</td></tr>`;
}
function renderSummary(){
  const tw=STOCKS.filter(s=>s.mkt==='TW'),us=STOCKS.filter(s=>s.mkt==='US');
  const head=`<tr><th>名稱</th><th>代號</th><th>收盤</th><th style="color:#e3b341">MA5</th><th style="color:#bc8cff">MA20</th><th style="color:#26a641">MA60</th><th>K值</th><th>D值</th><th>KD比</th><th>MACD</th><th style="text-align:left">⚠️ 入場提醒</th></tr>`;
  document.getElementById('mainView').innerHTML=`
<div class="panel">
  <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:#e3b341">📊 總覽 ｜ 點任一列看K線　<span id="dataDate" style="font-size:11px;color:#8b949e;font-weight:400"></span></div>
  <table class="tbl"><thead>${head}</thead><tbody>
    <tr class="sec-row"><td colspan="11">📌 台股</td></tr>
    ${tw.map(sumRow).join('')}
    <tr class="sec-row"><td colspan="11">🌐 美股</td></tr>
    ${us.map(sumRow).join('')}
  </tbody></table>
  <div style="margin-top:10px;font-size:10px;color:#8b949e;line-height:1.8">
    入場提醒包含：<span class="badge s-gold">KD金叉</span><span class="badge s-blue">突破/近20MA</span><span class="badge s-grn">MACD翻正</span>
    以及所有看漲K線型態：<span class="badge s-prp">⭐早晨之星</span><span class="badge s-grn">🔨錘子線</span><span class="badge s-grn">倒錘線</span><span class="badge s-grn">蜻蜓十字</span><span class="badge s-blue">🔴吞噬紅K</span><span class="badge s-blue">貫穿線</span><span class="badge s-grn">多頭孕線</span><span class="badge s-gold">✛十字線</span>
  </div>
</div>`;
  // 台股、美股各自顯示最新資料日期（避免互相干擾）
  const twS=DB["2330.TW"]||Object.values(DB).find(d=>d&&STOCKS.find(s=>s.sym===Object.keys(DB).find(k=>DB[k]===d)&&s.mkt==="TW"));
  const twSample=STOCKS.filter(s=>s.mkt==="TW").map(s=>DB[s.sym]).find(d=>d);
  const usSample=STOCKS.filter(s=>s.mkt==="US").map(s=>DB[s.sym]).find(d=>d);
  const dd=document.getElementById('dataDate');
  if(dd){
    let txt='';
    if(twSample){
      const twDate=twSample.data[twSample.data.length-1].date;
      const twLive=twSample.data._isLive?'(盤中)':'';
      txt+='台股:'+twDate+twLive;
    }
    if(usSample){
      const usDate=usSample.data[usSample.data.length-1].date;
      const usLive=usSample.data._isLive?'(盤中)':'';
      txt+='　美股:'+usDate+usLive;
    }

// 近20日逐日數據表格（像看盤軟體）
function dataTableHTML(sym){
  const db=DB[sym];if(!db)return'';
  const N=20;
  const data=db.data.slice(-N);
  const m5=db.ma5.slice(-N),m20=db.ma20.slice(-N),m60=db.ma60.slice(-N);
  const kd=db.kd.slice(-N),dif=db.macd.dif.slice(-N),hist=db.macd.hist.slice(-N);
  const macdL=db.macd.dif.slice(-N).map((d,i)=>{
    // 重算MACD訊號線值用 dif-hist
    return rnd(dif[i]-hist[i],2);
  });
  // 反序：最新在上
  const idxArr=[...Array(data.length).keys()].reverse();
  const rows=idxArr.map(i=>{
    const d=data[i];
    const prev=i>0?data[i-1].c:d.c;
    const chg=rnd(d.c-prev),chgP=rnd(chg/prev*100);
    const cls=chg>0?'up':chg<0?'dn':'fl';
    const k=kd[i];
    const kdState=k?(k.K>k.D?'<span class="up">▲K&gt;D</span>':'<span class="dn">▼K&lt;D</span>'):'—';
    const hv=hist[i];
    return`<tr>
      <td>${d.date}</td>
      <td>${d.o}</td><td>${d.h}</td><td>${d.l}</td>
      <td class="${cls}"><b>${d.c}</b></td>
      <td style="color:#8b949e">${(d.vol/1000).toFixed(0)}</td>
      <td style="color:#e3b341">${m5[i]??'—'}</td>
      <td style="color:#bc8cff">${m20[i]??'—'}</td>
      <td style="color:#26a641">${m60[i]??'—'}</td>
      <td>${k?k.K:'—'}</td><td>${k?k.D:'—'}</td>
      <td>${kdState}</td>
      <td>${dif[i]??'—'}</td>
      <td>${macdL[i]??'—'}</td>
      <td class="${hv>0?'up':hv<0?'dn':'fl'}">${hv??'—'}</td>
      <td class="${cls}">${chg>0?'+':''}${chg}</td>
      <td class="${cls}">${chgP>0?'+':''}${chgP}%</td>
    </tr>`;
  }).join('');
  return`<table class="tbl" style="min-width:900px">
    <thead><tr>
      <th>日期</th><th>開盤</th><th>最高</th><th>最低</th><th>收盤</th><th>成交量(張)</th>
      <th style="color:#e3b341">MA5</th><th style="color:#bc8cff">MA20</th><th style="color:#26a641">MA60</th>
      <th>K值</th><th>D值</th><th>KD狀態</th><th>DIF</th><th>MACD</th><th>柱狀</th><th>漲跌</th><th>漲跌%</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}
function drawAll(sym){
  const db=DB[sym];if(!db)return;
  const SHOW=22;
  const sl=db.data.slice(-SHOW),m5=db.ma5.slice(-SHOW),m10=db.ma10.slice(-SHOW),m20=db.ma20.slice(-SHOW),m60=db.ma60.slice(-SHOW);
  const kd=db.kd.slice(-SHOW),hist=db.macd.hist.slice(-SHOW),dif=db.macd.dif.slice(-SHOW);
  const pats=db.pats.filter(p=>p.i>=db.data.length-SHOW).map(p=>({...p,si:p.i-(db.data.length-SHOW)}));
  requestAnimationFrame(()=>{drawCandle('kC',sl,m5,m10,m20,m60,pats);drawKD('kdC',kd);drawMACD('mC',hist,dif);});
}
function drawCandle(id,data,m5,m10,m20,m60,pats){
  const c=document.getElementById(id);if(!c)return;
  const W=c.offsetWidth||640,H=280;c.width=W;c.height=H;const ctx=c.getContext('2d');ctx.clearRect(0,0,W,H);
  const P={t:30,b:28,l:8,r:50},cw=W-P.l-P.r,ch=H-P.t-P.b,n=data.length,bw=Math.max(3,Math.floor(cw/n*0.62));
  const allV=[...data.flatMap(d=>[d.h,d.l]),...m5,...m10,...m20,...m60].filter(v=>v!=null);
  const mn=Math.min(...allV)*0.999,mx=Math.max(...allV)*1.001;
  const yS=v=>(1-(v-mn)/(mx-mn))*ch+P.t,xS=i=>P.l+i*(cw/(n-1||1));
  ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=P.t+ch*i/4;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#8b949e';ctx.font='10px Arial';ctx.textAlign='left';ctx.fillText(rnd(mx-(mx-mn)*i/4),W-P.r+4,y+4);}
  data.forEach((d,i)=>{const x=xS(i),up=d.c>=d.o,col=up?'#f85149':'#26a641';const bt=Math.min(yS(d.o),yS(d.c)),bh=Math.max(1,Math.abs(yS(d.o)-yS(d.c)));ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yS(d.h));ctx.lineTo(x,bt);ctx.stroke();ctx.beginPath();ctx.moveTo(x,bt+bh);ctx.lineTo(x,yS(d.l));ctx.stroke();ctx.fillStyle=col;ctx.fillRect(x-bw/2,bt,bw,bh);});
  function dMA(arr,col,dash=[]){ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash(dash);ctx.beginPath();let s=false;arr.forEach((v,i)=>{if(v==null)return;const x=xS(i),y=yS(v);if(!s){ctx.moveTo(x,y);s=true;}else ctx.lineTo(x,y);});ctx.stroke();ctx.setLineDash([]);}
  dMA(m5,'#e3b341');dMA(m10,'#58a6ff');dMA(m20,'#bc8cff');dMA(m60,'#26a641',[4,3]);
  pats.forEach(p=>{const x=xS(p.si),yt=yS(data[p.si].h)-16;ctx.fillStyle=p.color;ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText(p.short,x,yt);ctx.beginPath();ctx.arc(x,yt-7,6,0,Math.PI*2);ctx.fillStyle=p.color+'44';ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=1;ctx.stroke();});
  ctx.fillStyle='#8b949e';ctx.font='9px Arial';ctx.textAlign='center';const st=Math.ceil(n/8);data.forEach((d,i)=>{if(i%st===0||i===n-1)ctx.fillText(d.date,xS(i),H-6);});
  const lg=[['#e3b341','MA5'],['#58a6ff','MA10'],['#bc8cff','MA20'],['#26a641','MA60']];let lx=P.l+4;ctx.font='10px Arial';ctx.textAlign='left';lg.forEach(([cl,l])=>{ctx.fillStyle=cl;ctx.fillRect(lx,5,14,3);ctx.fillStyle='#8b949e';ctx.fillText(l,lx+17,11);lx+=46;});
  c.onmousemove=e=>{const r=c.getBoundingClientRect(),mx2=(e.clientX-r.left)*(W/r.width);let cl=-1,md=9999;data.forEach((_,i)=>{const dd=Math.abs(xS(i)-mx2);if(dd<md){md=dd;cl=i;}});if(cl<0||md>30)return;const d=data[cl];const ch2=cl>0?rnd(d.c-data[cl-1].c):0,chp2=cl>0?rnd(ch2/data[cl-1].c*100):0;const pat=pats.find(p=>p.si===cl);const tt=document.getElementById('tt');tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';tt.innerHTML=`<b>${d.date}</b><br>開 ${d.o} | 高 ${d.h}<br>低 ${d.l} | 收 <b>${d.c}</b><br>漲跌 <span style="color:${ch2>=0?'#f85149':'#26a641'}">${ch2>=0?'+':''}${ch2} (${chp2}%)</span><br>MA5:${m5[cl]??'—'} MA10:${m10[cl]??'—'}<br>MA20:${m20[cl]??'—'} MA60:${m60[cl]??'—'}${pat?`<br><span style="color:${pat.color}">${pat.type}</span>`:''}`;};
  c.onmouseleave=()=>{document.getElementById('tt').style.display='none';};
}
function drawKD(id,kd){const c=document.getElementById(id);if(!c)return;const W=c.offsetWidth||640,H=90;c.width=W;c.height=H;const ctx=c.getContext('2d');const n=kd.length,P={t:8,b:8,l:8,r:50},cw=W-P.l-P.r,ch=H-P.t-P.b;const xS=i=>P.l+i*(cw/(n-1||1)),yS=v=>(1-v/100)*ch+P.t;ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;[0,20,50,80,100].forEach(v=>{ctx.beginPath();ctx.moveTo(P.l,yS(v));ctx.lineTo(W-P.r,yS(v));ctx.stroke();ctx.fillStyle='#8b949e';ctx.font='9px Arial';ctx.textAlign='left';ctx.fillText(v,W-P.r+4,yS(v)+3);});[[kd.map(k=>k.K),'#58a6ff'],[kd.map(k=>k.D),'#f85149']].forEach(([arr,col])=>{ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();arr.forEach((v,i)=>{i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v));});ctx.stroke();});}
function drawMACD(id,hist,dif){const c=document.getElementById(id);if(!c)return;const W=c.offsetWidth||640,H=90;c.width=W;c.height=H;const ctx=c.getContext('2d');const n=hist.length,P={t:8,b:8,l:8,r:50},cw=W-P.l-P.r,ch=H-P.t-P.b;const xS=i=>P.l+i*(cw/(n-1||1));const allV=[...hist,...dif].filter(v=>v!=null);const mn=Math.min(...allV),mx=Math.max(...allV),rng=mx-mn||0.001;const yS=v=>((mx-v)/rng)*ch+P.t,y0=yS(0);ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(P.l,y0);ctx.lineTo(W-P.r,y0);ctx.stroke();const bw=Math.max(2,cw/n*0.6);hist.forEach((v,i)=>{const x=xS(i),yt=Math.min(yS(v),y0),h=Math.abs(yS(v)-y0);ctx.fillStyle=v>=0?'rgba(248,81,73,0.7)':'rgba(38,166,65,0.7)';ctx.fillRect(x-bw/2,yt,bw,Math.max(1,h));});ctx.strokeStyle='#58a6ff';ctx.lineWidth=1.5;ctx.beginPath();dif.forEach((v,i)=>{if(v==null)return;i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v));});ctx.stroke();[mn,0,mx].forEach(v=>{ctx.fillStyle='#8b949e';ctx.font='9px Arial';ctx.textAlign='left';ctx.fillText(v.toFixed(2),W-P.r+4,yS(v)+3);});}

function trendCard(t){
  const color=t.impact==='high'?'#f85149':t.impact==='mid'?'#e3b341':'#8b949e';
  const tag=t.impact==='high'?'🔴 高度影響':t.impact==='mid'?'🟡 中度影響':'⚪ 觀察';
  return `<div style="background:#161b22;border:1px solid #30363d;border-left:3px solid ${color};border-radius:8px;padding:14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px">
      <span style="font-weight:700;font-size:14px;color:#e6edf3">${t.icon} ${t.title}</span>
      <span style="font-size:10px;color:${color};font-weight:700">${tag}</span>
    </div>
    <div style="font-size:12px;color:#c9d1d9;line-height:1.7;margin-bottom:8px">${t.summary}</div>
    <div style="font-size:12px;color:#58a6ff;line-height:1.6;margin-bottom:10px;background:#0d1a2d;padding:8px;border-radius:6px">${t.why}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${t.links.map(l=>`<a href="${l.url}" target="_blank" rel="noopener" style="font-size:11px;color:#58a6ff;text-decoration:none;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 10px">${l.name} ↗</a>`).join('')}
    </div>
  </div>`;
}

// ── 三大法人買賣超（證交所OpenAPI，當日個股）──
let INST_DATA=null;
async function fetchInst(){
  try{
    const res=await fetch(`${WORKER_URL}/?type=institutional&_t=${Date.now()}`,{cache:'no-store'});
    return await res.json();
  }catch(e){return null;}
}
async function renderInst(){
  document.getElementById('mainView').innerHTML='<div class="panel"><div class="loading">🔄 載入三大法人資料中...</div></div>';
  if(!INST_DATA)INST_DATA=await fetchInst();
  const data=INST_DATA;
  if(!data||!Array.isArray(data)){
    document.getElementById('mainView').innerHTML='<div class="panel"><div class="loading">三大法人資料暫無法取得(可能非交易日或證交所未更新)</div></div>';
    return;
  }
  // 我追蹤的台股代號（去掉.TW/.TWO）
  const myTW=STOCKS.filter(s=>s.mkt==='TW').map(s=>({code:s.sym.replace(/\.TWO?$/,''),name:s.name}));
  // 證交所T86欄位：證券代號/證券名稱/外陸資買賣超股數(不含外資自營)/投信買賣超股數/自營商買賣超股數/三大法人買賣超股數
  const rows=myTW.map(stock=>{
    const found=data.find(d=>d["證券代號"]===stock.code||d["Code"]===stock.code);
    if(!found)return `<tr><td class="nm">${stock.name}</td><td>${stock.code}</td><td colspan="4" style="color:#8b949e">無資料(可能上櫃或非當日)</td></tr>`;
    // 取得各欄位（證交所欄位名稱）
    const foreign=parseInt((found["外陸資買賣超股數(不含外資自營商)"]||found["外資買賣超股數"]||"0").replace(/,/g,''))||0;
    const trust=parseInt((found["投信買賣超股數"]||"0").replace(/,/g,''))||0;
    const dealer=parseInt((found["自營商買賣超股數"]||"0").replace(/,/g,''))||0;
    const total=parseInt((found["三大法人買賣超股數"]||"0").replace(/,/g,''))||0;
    const fmt=n=>{const lots=Math.round(n/1000);const cls=lots>0?'up':lots<0?'dn':'fl';return `<span class="${cls}">${lots>0?'+':''}${lots.toLocaleString()}</span>`;};
    return `<tr>
      <td class="nm">${stock.name}</td><td style="color:#8b949e">${stock.code}</td>
      <td>${fmt(foreign)}</td><td>${fmt(trust)}</td><td>${fmt(dealer)}</td>
      <td><b>${fmt(total)}</b></td></tr>`;
  }).join('');
  document.getElementById('mainView').innerHTML=`
  <div class="panel" style="overflow-x:auto">
    <div style="font-size:15px;font-weight:700;color:#e3b341;margin-bottom:4px">🏦 三大法人買賣超（當日，單位:張）</div>
    <div style="font-size:11px;color:#8b949e;margin-bottom:6px;line-height:1.6">資料來源:證交所OpenAPI。<span class="up">紅=買超(法人看好)</span> <span class="dn">綠=賣超(法人調節)</span>。僅顯示你追蹤的上市台股(上櫃股3324/3680證交所此API不含)。</div>
    <table class="tbl" style="min-width:560px">
      <thead><tr><th>名稱</th><th>代號</th><th>外資</th><th>投信</th><th>自營商</th><th>三大法人合計</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:10px;font-size:10px;color:#8b949e;line-height:1.7">
      💡 解讀:<br>
      • <b style="color:#f85149">外資連續買超</b> = 國際資金看好,通常帶動股價<br>
      • <b style="color:#58a6ff">投信買超</b> = 國內法人(基金)布局,常有作帳行情<br>
      • 三大法人同步買超 = 較強訊號;互相對作 = 方向分歧<br>
      • 此為「當日」資料,要看趨勢需連續觀察數日
    </div>
  </div>`;
}
